name: Release Publisher

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    env:
      APPLE_CODESIGN_CERT_P12_BASE64: ${{ secrets.APPLE_CODESIGN_CERT_P12_BASE64 }}
      APPLE_CODESIGN_CERT_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERT_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-generic
          - os: windows-latest
            artifact_suffix: windows-x64
          - os: macos-13
            artifact_suffix: macos-x64
          - os: macos-14
            artifact_suffix: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml -P dist

      - name: Build macOS Vision Helper
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p native/bin
          swiftc -O native/macos-vision-scanner/main.swift \
            -framework Vision \
            -framework CoreGraphics \
            -framework ImageIO \
            -o native/bin/qr-native-macos

      - name: Import Apple Code Signing Certificate
        if: runner.os == 'macOS' && env.APPLE_CODESIGN_CERT_P12_BASE64 != '' && env.APPLE_CODESIGN_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != ''
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-codesign
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/codesign-cert.p12"
          keychain_path="$RUNNER_TEMP/datashot-signing.keychain-db"

          echo "$APPLE_CODESIGN_CERT_P12_BASE64" | base64 -D > "$cert_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_CODESIGN_CERT_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

      - name: Sign macOS Native Helper
        if: runner.os == 'macOS' && env.APPLE_CODESIGN_CERT_P12_BASE64 != '' && env.APPLE_CODESIGN_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != ''
        shell: bash
        run: |
          set -euo pipefail
          codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" native/bin/qr-native-macos
          codesign --verify --strict --verbose=2 native/bin/qr-native-macos

      - name: Build Windows QR Helper
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S native/windows-qr-scanner -B native/windows-qr-scanner/build -A x64
          cmake --build native/windows-qr-scanner/build --config Release
          New-Item -ItemType Directory -Path native/bin -Force | Out-Null
          Copy-Item native/windows-qr-scanner/build/Release/qr-native-windows.exe native/bin/qr-native-windows.exe -Force

      - name: Determine Release Version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ -z "$version" ]]; then
            version="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package OS Artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          bundle_dir="$(./bin/package-os-artifact.sh "${{ matrix.artifact_suffix }}" "$version")"
          archive="dist/DataShot-${version}-${{ matrix.artifact_suffix }}.zip"
          tar -a -cf "$archive" -C dist "$(basename "$bundle_dir")"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Notarize macOS Artifact
        if: runner.os == 'macOS' && env.APPLE_CODESIGN_CERT_P12_BASE64 != '' && env.APPLE_CODESIGN_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != '' && env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_ISSUER_ID != '' && env.APPLE_NOTARY_API_KEY_P8_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          echo "$APPLE_NOTARY_API_KEY_P8_BASE64" | base64 -D > "$key_path"
          xcrun notarytool submit "${{ steps.package.outputs.archive }}" \
            --key "$key_path" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

      - name: Upload Matrix Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_OUTPUT"

      - name: Determine Changelog
        id: changelog_determiner
        run: |
          changelog="$(./bin/extract-changelog.sh CHANGELOG.md ${{ steps.get_version.outputs.VERSION }})"
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changelog" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download Matrix Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-assets

      - name: Create Release
        id: create_release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.changelog_determiner.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        id: upload_release
        if: success()
        uses: csexton/release-asset-action@v2
        with:
          pattern: "dist-assets/**/*.zip"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-url: ${{ steps.create_release.outputs.upload_url }}
